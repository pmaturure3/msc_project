{% extends "app01_phish_detector/base.html" %}
{% load static %}

{% block body_block %}


<div class="text-center">


    
      

<h4>Prediction Result</h4>

<p>Checked URL: {{url}}</p>

{% if ans == 1 %}

<div class="alert alert-danger">
<h4>Phishing attack</h4>
<p>Do not click. The URL is not safe.</p>
</div>

{% else %}

<div class="alert alert-success">
<h4>Normal link</h4>
<p>The URL appears to be safe.</p>
</div>

{% endif %}

    




{% endblock %}
