<!DOCTYPE html>
<html lang="en">
{% load static %}
{% load crispy_forms_tags %}

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css"
        integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">

    <!-- Chart js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.css"
        integrity="sha256-aa0xaJgmK/X74WM224KMQeNQC2xYKwlAt08oZqjeF0E=" crossorigin="anonymous" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js"
        integrity="sha256-Uv9BNBucvCPipKQ2NS9wYpJmi8DTOEfTA/nH2aoJALw=" crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <title>Phishing Detection | {{ page_title }}</title>

    <style>
        html, body {
            overflow-x: hidden;
        }

        .main_container_section {
            min-height: 65vh;
        }

        .nav_background {
            background-color: #003C71;
        }

        .breadcrumb {
            border-radius: 0;
        }

        .breadcrumb-bar {
            background-color: #00264D !important;
        }

        .top_logos .navbar-brand {
            white-space: normal;
            font-size: 1rem;
            color: #003C71 !important;
            font-weight: 600;
        }

        @media (max-width: 576px) {
            .top_logos .navbar-brand {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="container-fluid px-3 px-md-5 top_logos">
        <div class="row align-items-center py-2">
            <div class="col-12">
                <a class="navbar-brand" href="{% url 'index' %}">
                    Phishing Detection System |
                </a>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark nav_background">
        <div class="container-fluid px-3 px-md-5">
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}">Feature Input</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com/pmaturure3/msc_project" target="_blank">GitHub</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 breadcrumb-bar">
            <li class="breadcrumb-item" aria-current="page">
                <a href="/" class="text-white-50">Home</a>
                <span class="text-white mx-1">&gt;</span>
                <span class="text-white">{{ page_title }}</span>
            </li>
        </ol>
    </nav>

    <div class="container main_container_section py-3">
        <div class="row">
            <div class="col-12">
                {% block body_block %}
                {% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF"
        crossorigin="anonymous"></script>

    {% block scripts %}
    {% endblock scripts %}
</body>
</html>
